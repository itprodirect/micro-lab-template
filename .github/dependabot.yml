version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/templates/go"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/templates/rust"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/templates/go"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/templates/rust"
    schedule:
      interval: "weekly"
